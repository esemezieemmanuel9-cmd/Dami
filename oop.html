      // classes
         class Products {
          constructor(name, price){
            this.name = name;
            this.price = price;
          }

          display.Products(){
            console.log(`Product: ${this.name}`);
            console.log(`Product: $${this.price.toFixed(2)}`);

          }

          calculateTotal(salesTax){
            return this.price + (this.price * salesTax)
          }




         }
