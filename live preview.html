<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<style>

    body{
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        background-color: white;
        display: grid;
        justify-content: center;
        padding: 30px;
    }
    .container{
     width: 350px;
     
    }
    .form-box{
        background-color: white;
        padding: 2px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px black;
        margin-bottom: 20px;

    }

    h2{
        text-align: center;
        color: blue;

    }

    input{
        width: 90%;
        padding: 10px;
        margin-top: 10px;
        border: 1px solid azure;
        border-radius: 5px;
        font-size: 16px;
    
    }
    button{
        width: 100%;
        padding: 10px;
        margin-top: 15px;
        background-color: cadetblue;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 10px;
        cursor: pointer;
    }

    button:hover{
        background-color: darkblue;

    }
    .previewBox{
        background-color: white;
        padding: 2px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px black;
        display: none;
    }
    .previewBox p{
        margin: 10px 0;
        font-size: 16px;
    }

     span{
        color: black;
        font-weight: bold;
     }

</style>
<body>
    <!-- FORM -->
    <div class="container">

        <div class="form-box">
            <h2>Registration Form</h2>
            <input type="text" id="Name" placeholder="Enter your Name">
            <input type="email" id="Email" placeholder="Enter your Email">
            <input type="password" id="Password" placeholder="Enter your password">
            <button onclick="SubmitForm()">Register</button>
        </div>
        <!-- LIVE PREVIEW -->
    </div>
    <div class="PreviewBox">
        <h2>Live Preview-box</h2>
        <p>Name: <span id="showName"></span></p>
        <p>Email: <span id="showEmail"></span></p>
        <P>Password: <span id="showPassword"></span></P>
    </div>
    <script>
// GET INPUT ELEMENTS
let nameInput = document.getElementById("Name");
let emailInput = document.getElementById("Email");
let passwordInput = document.getElementById("Password");

// GET DISPLAY ELEMENTS
let showName = document.getElementById("showName");
let showEmail = document.getElementById("showEmail");
let showPassword = document.getElementById("showPassword");
let previewBox = document.querySelector(".previewBox");

nameInput.addEventListener("keyup", function(){
    showName.textContent = nameInput.value;
    previewBox.style.display = ("block")
 });


emailInput.addEventListener("keyup", function(){
    showEmail.textContent = emailInput.value;
    previewBox.style.display = ("block")
 });
 
 
passwordInput.addEventListener("keyup", function(){
    showPassword.textContent = passwordInput.value;
    previewBox.style.display = ("block")
 });

 function submitForm(){
    alert(
        'Registered Successfully'
    )
 }
 
    </script>
    
</body>
</html>
